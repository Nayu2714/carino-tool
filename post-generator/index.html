<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <title>VRC Carino | 事前応募受付ポスト 生成ツール</title>
</head>
<body>
  <h1>事前応募受付ポスト 生成ツール</h1>
  <div class="date-row">
    <div class="form-group date-input">
      <label for="eventDate">営業日（月/日）</label>
      <input type="text" id="eventDate" placeholder="例：6/23">
    </div>

    <div class="form-group day-input">
      <label for="eventDay">営業曜日</label>
      <select id="eventDay">
        <option>月</option>
        <option selected>火</option>
        <option>水</option>
        <option>木</option>
        <option>金</option>
        <option>土</option>
        <option>日</option>
      </select>
    </div>
  </div>

  <div class="date-row">
    <div class="form-group date-input">
      <label for="deadlineDate">〆切日（月/日）</label>
      <input type="text" id="deadlineDate" placeholder="例：6/17">
    </div>

    <div class="form-group day-input">
      <label for="deadlineDay">〆切曜日</label>
      <select id="deadlineDay">
        <option>月</option>
        <option>火</option>
        <option selected>水</option>
        <option>木</option>
        <option>金</option>
        <option>土</option>
        <option>日</option>
      </select>
    </div>
  </div>

  <div class="form-group">
    <label for="formUrl">フォームURL</label>
    <input type="text" id="formUrl" placeholder="https://forms.gle/xxxxx">
  </div>

  <div id="preview">ここに本文のプレビューが表示されます。</div>

  <div class="button-group">
    <button onclick="copyText()">
      <i class="fa-regular fa-copy"></i> 本文をコピー
    </button>
    <button onclick="copyUrl()">
      <i class="fa-solid fa-link"></i> URLをコピー
    </button>
  </div>

  <a id="openLink" href="###" target="_blank" class="open-button">
    <i class="fa-brands fa-x-twitter"></i> Xの投稿画面を開く
  </a>

  <script src="script.js"></script>
</body>
</html>
